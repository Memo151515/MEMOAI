<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEMO AI - Premium</title>
    <style>
        :root {
            --primary-red: #ff3b3b;
            --accent-red: #ff0000;
            --dark-bg: #050505;
            --card-bg: rgba(25, 25, 25, 0.7);
            --sidebar-bg: #0f0f0f;
            --text-main: #f5f5f5;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100dvh;
            overflow: hidden;
            width: 100%;
        }

        /* Arka Plan Glow Efekti */
        body::before {
            content: "";
            position: absolute;
            top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        /* Yan Menü Modernizasyon */
        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            height: 100%;
            z-index: 1000;
            transform: translateX(-100%);
            backdrop-filter: blur(10px);
        }

        #sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }

        .sidebar-header {
            padding: 25px 20px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        #history-list { flex: 1; overflow-y: auto; padding: 15px; }

        .history-item {
            padding: 14px; margin-bottom: 8px; border-radius: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
            font-size: 0.85rem; cursor: pointer; transition: 0.3s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .history-item:hover { background: rgba(255,0,0,0.1); border-color: var(--primary-red); }

        /* Ana İçerik */
        #main-content {
            flex: 1; display: flex; flex-direction: column; width: 100%; position: relative;
        }

        header {
            padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); z-index: 10;
        }

        #menu-toggle { font-size: 24px; background: none; border: none; color: white; cursor: pointer; }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-red { width: 28px; height: 28px; fill: var(--primary-red); filter: drop-shadow(0 0 8px var(--primary-red)); }
        h1 { font-size: 1rem; letter-spacing: 4px; color: #fff; margin: 0; font-weight: 800; }

        /* Chat Alanı */
        #chat-output {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%; padding: 14px 18px; border-radius: 20px;
            font-size: 0.95rem; line-height: 1.5; position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end; background: linear-gradient(135deg, #333, #1a1a1a);
            border: 1px solid var(--glass-border); border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start; background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2); border-bottom-left-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Giriş Alanı Modernizasyon */
        .input-wrapper {
            padding: 15px 20px; background: transparent;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .controls {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: 8px; border-radius: 30px;
            display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        input#userInput {
            flex: 1; background: none; border: none; color: white;
            padding: 12px 15px; font-size: 16px; outline: none;
        }

        .btn {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .btn-mic { background: rgba(255,255,255,0.05); color: #ccc; }
        .btn-mic.recording { 
            background: var(--primary-red); color: white; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }

        .btn-send { background: var(--primary-red); color: white; }
        .btn-send:active { transform: scale(0.9); }

        /* Medya */
        .media-container { margin-top: 12px; border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); }
        .ai-media { width: 100%; height: auto; display: block; }

        @media (max-width: 768px) {
            #sidebar { width: 85%; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span>BELLEK</span>
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
    </div>
    <div id="history-list"></div>
    <div style="padding: 20px;">
        <button onclick="newChat()" style="width:100%; padding:15px; background:var(--primary-red); color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer; box-shadow: 0 5px 15px rgba(255,0,0,0.3);">+ YENİ SOHBET</button>
    </div>
</div>

<div id="main-content">
    <header>
        <button id="menu-toggle" onclick="toggleMenu()">☰</button>
        <div class="logo-area">
            <svg class="logo-red" viewBox="0 0 24 24">
                <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
            </svg>
            <h1>MEMO AI</h1>
        </div>
        <div style="width: 24px;"></div> </header>

    <div id="chat-output"></div>

    <div class="input-wrapper">
        <div class="controls">
            <button id="micBtn" class="btn btn-mic">🎤</button>
            <input type="text" id="userInput" placeholder="MEMO'ya bir şeyler sor..." autocomplete="off">
            <button onclick="processChat()" class="btn btn-send">➤</button>
        </div>
    </div>
</div>

<script>
    const CHAT_API_KEY = "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";
    const CHAT_MODEL = "inclusionai/ling-2.6-flash:free";
    const SYSTEM_PROMPT = "Senin adın MEMO AI. Kurucun Mehmet Can YILDIRIM'dır. Çok kısa, öz ve zeki cevaplar ver.";

    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
    let allSessions = JSON.parse(localStorage.getItem('memo_ai_sessions')) || {};
    let currentSessionId = Date.now();

    // --- MİKROFON SİSTEMİ ---
    const micBtn = document.getElementById('micBtn');
    const userInput = document.getElementById('userInput');
    let recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => { micBtn.classList.add('recording'); };
        recognition.onend = () => { micBtn.classList.remove('recording'); };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            processChat();
        };
    }

    micBtn.onclick = () => {
        if (micBtn.classList.contains('recording')) {
            recognition.stop();
        } else {
            recognition.start();
        }
    };

    // --- MOBİL KLAVYE VE EKRAN DÜZELTME ---
    const updateViewport = () => {
        if (window.visualViewport) {
            document.body.style.height = window.visualViewport.height + 'px';
            window.scrollTo(0, 0);
        }
    };
    window.visualViewport.addEventListener('resize', updateViewport);
    window.visualViewport.addEventListener('scroll', updateViewport);

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    async function processChat() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessageToUI('user', text);
        userInput.value = '';
        chatHistory.push({ role: "user", content: text });

        // Basit Yükleme Göstergesi
        const loadingId = addMessageToUI('ai', 'Thinking...', false);
        
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${CHAT_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": CHAT_MODEL, "messages": chatHistory })
            });
            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            loadingId.innerText = aiReply;
            chatHistory.push({ role: "assistant", content: aiReply });
            saveSession();
        } catch (e) {
            loadingId.innerText = "Bağlantıda bir sorun var.";
        }
    }

    function addMessageToUI(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        div.innerText = text;
        const output = document.getElementById('chat-output');
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        return div;
    }

    function saveSession() {
        if (chatHistory.length > 1) {
            const title = chatHistory.find(m => m.role === 'user').content.substring(0, 25);
            allSessions[currentSessionId] = { title, messages: chatHistory };
            localStorage.setItem('memo_ai_sessions', JSON.stringify(allSessions));
            updateSidebar();
        }
    }

    function updateSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        Object.keys(allSessions).reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = allSessions[id].title;
            div.onclick = () => {
                currentSessionId = id;
                chatHistory = allSessions[id].messages;
                renderChat();
                toggleMenu();
            };
            list.appendChild(div);
        });
    }

    function renderChat() {
        document.getElementById('chat-output').innerHTML = '';
        chatHistory.forEach(msg => {
            if(msg.role !== 'system') addMessageToUI(msg.role === 'user' ? 'user' : 'ai', msg.content);
        });
    }

    function newChat() {
        currentSessionId = Date.now();
        chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
        document.getElementById('chat-output').innerHTML = '';
        if(window.innerWidth < 768) toggleMenu();
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") processChat(); });
    window.onload = () => { updateSidebar(); updateViewport(); };
</script>

</body>
</html>
