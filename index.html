<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --chat-bg: #161616;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-red);
            background: rgba(0,0,0,0.8);
            z-index: 10;
        }

        .logo-red {
            width: 40px;
            height: 40px;
            fill: var(--primary-red);
            filter: drop-shadow(0 0 10px var(--primary-red));
        }

        h1 {
            font-size: 0.9rem;
            margin: 5px 0 0;
            letter-spacing: 4px;
            color: var(--primary-red);
            text-transform: uppercase;
        }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%);
        }

        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background: #2c2c2c;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--primary-red);
            color: white;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }

        .controls {
            padding: 20px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #222;
        }

        input#userInput {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            outline: none;
        }

        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-mic { background: transparent; border: 2px solid var(--primary-red); color: var(--primary-red); }
        .btn-mic.recording { background: var(--primary-red); color: white; animation: pulse 1s infinite; }
        .btn-send { background: var(--primary-red); color: white; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<header>
    <svg class="logo-red" viewBox="0 0 24 24">
        <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
    </svg>
    <h1>MEMO AI</h1>
</header>

<div id="chat-output"></div>

<div class="controls">
    <button id="micBtn" class="btn btn-mic">🎤</button>
    <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
    <button onclick="processChat()" class="btn btn-send">➤</button>
</div>

<script>
    const API_KEY = "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";
    const MODEL_NAME = "inclusionai/ling-2.6-flash:free";
    
    // Geçmişi yükle veya yeni başlat
    let chatHistory = JSON.parse(localStorage.getItem('memo_ai_history')) || [
        { role: "system", content: "Senin adın MEMO AI. Çok hızlı, zeki ve yardımsever bir asistansın." }
    ];

    // Sayfa yüklendiğinde eski mesajları ekrana bas
    window.onload = () => {
        chatHistory.forEach(msg => {
            if(msg.role !== 'system') addMessageToUI(msg.role === 'user' ? 'user' : 'ai', msg.content);
        });
    };

    const micBtn = document.getElementById('micBtn');
    const inputField = document.getElementById('userInput');
    const outputArea = document.getElementById('chat-output');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';
        micBtn.onclick = () => { recognition.start(); micBtn.classList.add('recording'); };
        recognition.onresult = (e) => { 
            inputField.value = e.results[0][0].transcript; 
            micBtn.classList.remove('recording'); 
            processChat(); 
        };
        recognition.onend = () => micBtn.classList.remove('recording');
    }

    async function processChat() {
        const text = inputField.value.trim();
        if (!text) return;

        addMessageToUI('user', text);
        inputField.value = '';

        chatHistory.push({ role: "user", content: text });
        saveHistory();

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": MODEL_NAME,
                    "messages": chatHistory
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0]) {
                const aiReply = data.choices[0].message.content;
                addMessageToUI('ai', aiReply);
                chatHistory.push({ role: "assistant", content: aiReply });
                saveHistory();
            } else {
                throw new Error("Yanıt alınamadı.");
            }

        } catch (e) {
            addMessageToUI('ai', "Bağlantı hatası: " + e.message);
        }
    }

    function addMessageToUI(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        div.innerText = text;
        outputArea.appendChild(div);
        outputArea.scrollTop = outputArea.scrollHeight;
    }

    function saveHistory() {
        localStorage.setItem('memo_ai_history', JSON.stringify(chatHistory));
    }

    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") processChat(); });
</script>

</body>
</html>
