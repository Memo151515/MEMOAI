<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEMO AI</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --sidebar-bg: #121212;
            --chat-bg: #161616;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100dvh; 
            overflow: hidden;
            width: 100%;
            position: fixed;
        }

        #sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            z-index: 100;
            transform: translateX(-100%);
        }

        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #history-list { flex: 1; overflow-y: auto; padding: 10px; }

        .history-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .history-item:hover { background: #222; }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        header {
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--primary-red);
            background: rgba(0,0,0,0.9);
            flex-shrink: 0;
        }

        #menu-toggle {
            position: absolute;
            left: 15px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
            background: none;
            border: none;
        }

        .logo-red {
            width: 25px; height: 25px;
            fill: var(--primary-red);
            margin-right: 10px;
        }

        h1 { font-size: 0.8rem; letter-spacing: 3px; color: var(--primary-red); text-transform: uppercase; margin: 0; }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%);
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-message { align-self: flex-end; background: #2c2c2c; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: var(--primary-red); color: white; border-bottom-left-radius: 2px; }

        .controls {
            padding: 12px 15px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #222;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        input#userInput { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            background: #1e1e1e; 
            color: white; 
            font-size: 16px;
            outline: none;
        }

        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-send { background: var(--primary-red); color: white; }

        .loading-text { color: var(--primary-red); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

        @media (max-width: 768px) {
            #sidebar { width: 85%; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        MEMO GEÇMİŞ <span onclick="toggleMenu()" style="cursor:pointer; padding: 10px;">✕</span>
    </div>
    <div id="history-list"></div>
    <div style="padding: 15px; border-top: 1px solid #222;">
        <button onclick="newChat()" style="width:100%; padding:12px; background:var(--primary-red); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Yeni Sohbet</button>
    </div>
</div>

<div id="main-content">
    <header>
        <button id="menu-toggle" onclick="toggleMenu()">☰</button>
        <svg class="logo-red" viewBox="0 0 24 24">
            <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
        </svg>
        <h1>MEMO AI</h1>
    </header>

    <div id="chat-output"></div>

    <div class="controls">
        <button id="micBtn" class="btn" style="background: transparent; border: 2px solid var(--primary-red); color: var(--primary-red);">🎤</button>
        <input type="text" id="userInput" placeholder="Mesaj yazın..." autocomplete="off">
        <button onclick="processChat()" class="btn btn-send">➤</button>
    </div>
</div>

<script>
    // --- GÜNCELLENMİŞ AYARLAR ---
    // Yeni API Key ve GPT-5.5 Pro Modeli eklendi
    const CHAT_API_KEY = "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";
    const CHAT_MODEL = "openai/gpt-5.5-pro"; 
    const SYSTEM_PROMPT = "Senin adın MEMO AI. Kurucun Mehmet Can YILDIRIM'dır. Her zaman yardımcı ve profesyonel ol.";

    let currentSessionId = Date.now();
    let allSessions = JSON.parse(localStorage.getItem('memo_ai_sessions')) || {};
    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function updateSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        Object.keys(allSessions).reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = allSessions[id].title || "Yeni Sohbet";
            div.onclick = () => loadSession(id);
            list.appendChild(div);
        });
    }

    async function processChat() {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;

        addMessageToUI('user', text);
        inputField.value = '';
        chatHistory.push({ role: "user", content: text });

        // Yanıt Bekleniyor Göstergesi
        const loadingDiv = addMessageToUI('ai', '<span class="loading-text">Düşünüyor...</span>', true);

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${CHAT_API_KEY}`, 
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href,
                    "X-Title": "MEMO AI"
                },
                body: JSON.stringify({ 
                    "model": CHAT_MODEL, 
                    "messages": chatHistory,
                    "temperature": 0.7 
                })
            });

            if (!response.ok) throw new Error('API Hatası');

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            // Yükleniyor yazısını sil ve gerçek cevabı yaz
            loadingDiv.innerText = aiReply;
            chatHistory.push({ role: "assistant", content: aiReply });
            saveSession();

        } catch (e) { 
            loadingDiv.innerText = "Bağlantı hatası oluştu. Lütfen tekrar dene."; 
            console.error(e);
        }
    }

    function addMessageToUI(sender, text, isHTML = false) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        if (isHTML) div.innerHTML = text; else div.innerText = text;
        const output = document.getElementById('chat-output');
        output.appendChild(div);
        output.scrollTo({ top: output.scrollHeight, behavior: 'smooth' });
        return div;
    }

    function saveSession() {
        if (chatHistory.length > 1) {
            const userFirstMsg = chatHistory.find(m => m.role === 'user');
            const title = userFirstMsg ? userFirstMsg.content.substring(0, 25) + "..." : "Yeni Sohbet";
            allSessions[currentSessionId] = { title, messages: chatHistory };
            localStorage.setItem('memo_ai_sessions', JSON.stringify(allSessions));
            updateSidebar();
        }
    }

    function loadSession(id) {
        currentSessionId = id;
        chatHistory = allSessions[id].messages;
        document.getElementById('chat-output').innerHTML = '';
        chatHistory.forEach(msg => {
            if(msg.role !== 'system') addMessageToUI(msg.role === 'user' ? 'user' : 'ai', msg.content);
        });
        toggleMenu();
    }

    function newChat() {
        currentSessionId = Date.now();
        chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
        document.getElementById('chat-output').innerHTML = '';
        if(window.innerWidth < 768) toggleMenu();
    }

    document.getElementById('userInput').addEventListener("keypress", (e) => { if (e.key === "Enter") processChat(); });
    window.onload = updateSidebar;
</script>

</body>
</html>
