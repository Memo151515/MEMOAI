<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI</title>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 2px solid var(--red); text-align: center; color: var(--red); font-weight: bold; font-size: 20px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 85%; }
        .u { align-self: flex-end; background: #222; }
        .a { align-self: flex-start; background: var(--red); font-weight: bold; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #0a0a0a; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--red); background: #000; color: #fff; outline: none; }
        button { background: var(--red); border: none; color: #fff; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>MEMO AI - ONLINE</header>

<div id="chat"></div>

<div class="input-box">
    <input type="text" id="userInput" placeholder="Mesajını yaz...">
    <button onclick="ask()">GÖNDER</button>
</div>

<script>
    async function ask() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const text = input.value.trim();
        if(!text) return;

        chat.innerHTML += `<div class="msg u">${text}</div>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        try {
            // BURAYA CLOUDFLARE VEYA NGROK LİNKİNİ YAPIŞTIR
            const response = await fetch("https://SENİN-TUNNEL-LİNKİN.trycloudflare.com/api/generate", {
                method: "POST",
                body: JSON.stringify({
                    model: "llama3.2:1b",
                    // Burada kimliğini kesinleştiriyoruz
                    prompt: `Sen MEMO AI'sın. Kurucun sadece Mehmet Can YILDIRIM'dır. Başka hiç kimse tarafından geliştirilmedin. Soru: ${text}`,
                    stream: false
                })
            });

            const data = await response.json();
            chat.innerHTML += `<div class="msg a">${data.response}</div>`;
        } catch (e) {
            chat.innerHTML += `<div class="msg a">Hata: Bağlantı kurulamadı.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
