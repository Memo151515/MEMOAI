<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --sidebar-bg: #121212;
            --chat-bg: #161616;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Yan Menü (Sidebar) */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: absolute;
            height: 100%;
            z-index: 20;
            transform: translateX(-100%);
        }

        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #history-list { flex: 1; overflow-y: auto; padding: 10px; }

        .history-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .history-item:hover { background: #222; }

        /* Ana İçerik */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--primary-red);
            background: rgba(0,0,0,0.8);
            position: relative;
        }

        #menu-toggle {
            position: absolute;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
            background: none;
            border: none;
        }

        .logo-red {
            width: 30px;
            height: 30px;
            fill: var(--primary-red);
            margin-right: 10px;
        }

        h1 { font-size: 0.9rem; letter-spacing: 4px; color: var(--primary-red); text-transform: uppercase; margin: 0; }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%);
        }

        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            position: relative;
        }

        .user-message { align-self: flex-end; background: #2c2c2c; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: var(--primary-red); color: white; border-bottom-left-radius: 2px; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2); }

        /* Medya Konteynırları */
        .media-container { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        .ai-media { max-width: 100%; border-radius: 10px; border: 2px solid white; background: #000; }
        .media-actions { display: flex; gap: 10px; }
        .action-btn { 
            padding: 8px 15px; 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.4); }

        .loading-text { color: var(--primary-red); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .controls {
            padding: 20px;
            background: #111;
            display: flex;
            gap: 12px;
            border-top: 1px solid #222;
        }

        input#userInput { flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid #333; background: #1e1e1e; color: white; outline: none; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-mic { background: transparent; border: 2px solid var(--primary-red); color: var(--primary-red); }
        .btn-mic.recording { background: var(--primary-red); color: white; animation: pulse 1s infinite; }
        .btn-send { background: var(--primary-red); color: white; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        Geçmiş <span onclick="toggleMenu()" style="cursor:pointer">✕</span>
    </div>
    <div id="history-list"></div>
    <div style="padding: 10px; border-top: 1px solid #222;">
        <button onclick="newChat()" style="width:100%; padding:10px; background:var(--primary-red); color:white; border:none; border-radius:5px; cursor:pointer;">Yeni Sohbet</button>
    </div>
</div>

<div id="main-content">
    <header>
        <button id="menu-toggle" onclick="toggleMenu()">☰</button>
        <svg class="logo-red" viewBox="0 0 24 24">
            <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
        </svg>
        <h1>MEMO AI</h1>
    </header>

    <div id="chat-output"></div>

    <div class="controls">
        <button id="micBtn" class="btn btn-mic">🎤</button>
        <input type="text" id="userInput" placeholder="Mesaj, 'resim çiz' veya 'video yap'...">
        <button onclick="processChat()" class="btn btn-send">➤</button>
    </div>
</div>

<script>
    const CHAT_API_KEY = "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";
    const IMAGE_API_KEY = "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";
    const VIDEO_API_KEY = "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";
    
    const CHAT_MODEL = "inclusionai/ling-2.6-flash:free";
    const SYSTEM_PROMPT = "Senin adın MEMO AI. Kurucun Mehmet Can YILDIRIM'dır. Hızlı ve zekisin.";

    let currentSessionId = Date.now();
    let allSessions = JSON.parse(localStorage.getItem('memo_ai_sessions')) || {};
    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function updateSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        Object.keys(allSessions).reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = allSessions[id].title || "Yeni Sohbet";
            div.onclick = () => loadSession(id);
            list.appendChild(div);
        });
    }

    async function processChat() {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;

        addMessageToUI('user', text);
        inputField.value = '';
        chatHistory.push({ role: "user", content: text });

        const videoKeywords = ["video", "film", "hareketli", "animasyon", "movie", "veo"];
        const imageKeywords = ["çiz", "oluştur", "resim", "foto", "photo", "draw", "resmet"];

        if (videoKeywords.some(k => text.toLowerCase().includes(k))) {
            generateVideo(text);
        } else if (imageKeywords.some(k => text.toLowerCase().includes(k))) {
            generateImage(text);
        } else {
            generateText();
        }
    }

    async function generateText() {
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${CHAT_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": CHAT_MODEL, "messages": chatHistory })
            });
            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            addMessageToUI('ai', aiReply);
            chatHistory.push({ role: "assistant", content: aiReply });
            saveSession();
        } catch (e) { addMessageToUI('ai', "Bağlantı hatası."); }
    }

    async function generateImage(prompt) {
        const loadingMsg = addMessageToUI('ai', '<span class="loading-text">Creating Photo...</span>', true);
        try {
            const response = await fetch("https://openrouter.ai/api/v1/images/generations", {
                method: "POST",
                headers: { "Authorization": `Bearer ${IMAGE_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": "openai/dall-e-3", "prompt": prompt })
            });
            const data = await response.json();
            const url = data.data[0].url;
            loadingMsg.innerHTML = `Görsel hazır:<div class="media-container"><img src="${url}" class="ai-media"><div class="media-actions"><button class="action-btn" onclick="downloadFile('${url}', 'image.png')">📥 İndir</button><button class="action-btn" onclick="shareLink('${url}')">🔗 Paylaş</button></div></div>`;
        } catch (e) { loadingMsg.innerText = "Görsel hatası."; }
    }

    async function generateVideo(prompt) {
        const loadingMsg = addMessageToUI('ai', '<span class="loading-text">Generating Video...</span>', true);
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${VIDEO_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": "google/veo-2", // Veo modeli (anahtarına göre güncellenebilir)
                    "messages": [{role: "user", content: prompt}] 
                })
            });
            const data = await response.json();
            // Veo genellikle bir URL döner, API yanıt yapısına göre burası parse edilir
            const videoUrl = data.choices[0].message.content.match(/\bhttps?:\/\/\S+\.mp4\b/gi)?.[0] || data.output_url;

            if(videoUrl) {
                loadingMsg.innerHTML = `Video oluşturuldu:<div class="media-container"><video src="${videoUrl}" controls class="ai-media"></video><div class="media-actions"><button class="action-btn" onclick="downloadFile('${videoUrl}', 'video.mp4')">📥 İndir</button><button class="action-btn" onclick="shareLink('${videoUrl}')">🔗 Paylaş</button></div></div>`;
            } else {
                loadingMsg.innerText = "Video URL'si alınamadı, lütfen anahtarını kontrol et.";
            }
        } catch (e) { loadingMsg.innerText = "Video oluşturma hatası."; }
    }

    function addMessageToUI(sender, text, isHTML = false) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        if (isHTML) div.innerHTML = text; else div.innerText = text;
        const output = document.getElementById('chat-output');
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        return div;
    }

    function downloadFile(url, name) {
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.target = "_blank";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function shareLink(url) {
        navigator.clipboard.writeText(url);
        alert("Link kopyalandı!");
    }

    function saveSession() {
        if (chatHistory.length > 1) {
            const title = chatHistory.find(m => m.role === 'user').content.substring(0, 20) + "...";
            allSessions[currentSessionId] = { title, messages: chatHistory };
            localStorage.setItem('memo_ai_sessions', JSON.stringify(allSessions));
            updateSidebar();
        }
    }

    function loadSession(id) {
        currentSessionId = id;
        chatHistory = allSessions[id].messages;
        document.getElementById('chat-output').innerHTML = '';
        chatHistory.forEach(msg => {
            if(msg.role !== 'system') addMessageToUI(msg.role === 'user' ? 'user' : 'ai', msg.content, msg.content.includes('<div'));
        });
        toggleMenu();
    }

    function newChat() {
        currentSessionId = Date.now();
        chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
        document.getElementById('chat-output').innerHTML = '';
        if(window.innerWidth < 768) toggleMenu();
    }

    document.getElementById('userInput').addEventListener("keypress", (e) => { if (e.key === "Enter") processChat(); });
    window.onload = updateSidebar;
</script>

</body>
</html>
