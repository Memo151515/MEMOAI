<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEMO AI v3</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #080808;
            --chat-user: #1a1a1a;
            --chat-ai: #121212;
            --accent: #ff3333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .menu-btn { font-size: 24px; background: none; border: none; color: white; cursor: pointer; }
        .logo { color: var(--primary-red); font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; }

        /* Sidebar */
        #sidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: 280px;
            height: 100%;
            background: #111;
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid #222;
            padding: 20px;
        }

        #sidebar.active { left: 0; }

        .history-item {
            padding: 12px;
            background: #1a1a1a;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .history-item:hover { border-left-color: var(--primary-red); background: #222; }

        /* Chat Area */
        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at top, #150000 0%, #080808 100%);
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: var(--chat-user); border: 1px solid #333; color: #eee; }
        .ai-msg { align-self: flex-start; background: var(--chat-ai); border-left: 4px solid var(--primary-red); color: #fff; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); }

        /* Input Area */
        .input-container {
            padding: 15px;
            background: #080808;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .input-box {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        .input-box:focus { border-color: var(--primary-red); }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.2rem;
        }

        #mic-btn { background: #222; color: #fff; }
        #mic-btn.active { background: var(--primary-red); animation: pulse 1.5s infinite; }
        #send-btn { background: var(--primary-red); color: white; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
        #overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar">
    <h2 style="color: var(--primary-red);">BELLEK</h2>
    <button onclick="newChat()" style="width:100%; padding:12px; background:var(--primary-red); border:none; color:white; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:20px;">+ YENİ SOHBET</button>
    <div id="history-list"></div>
</div>

<header>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="logo">MEMO AI</div>
    <div style="width: 24px;"></div>
</header>

<div id="chat-output"></div>

<div class="input-container">
    <button id="mic-btn" class="icon-btn">🎤</button>
    <input type="text" id="userInput" class="input-box" placeholder="Mesajınızı yazın..." autocomplete="off">
    <button id="send-btn" class="icon-btn" onclick="handleSend()">➤</button>
</div>

<script>
    // --- AYARLAR ---
    const API_KEY = "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";
    // Daha tutarlı ve zeki cevaplar için Google Gemini Flash 1.5 modeline yönlendirdim
    const MODEL = "google/gemini-flash-1.5-8b"; 
    const SYSTEM_PROMPT = "Senin adın MEMO AI. Mehmet Can YILDIRIM tarafından geliştirildin. Samimi ama zeki bir asistansın. Gereksiz uzatmadan, doğrudan ve mantıklı cevaplar ver. Boş konuşma.";

    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
    
    // --- SİDEBAR & GEÇMİŞ ---
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function newChat() {
        chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
        document.getElementById('chat-output').innerHTML = '';
        toggleSidebar();
    }

    // --- MİKROFON (TAMİR EDİLDİ) ---
    const micBtn = document.getElementById('mic-btn');
    let recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';
        recognition.interimResults = false;

        recognition.onstart = () => { micBtn.classList.add('active'); };
        recognition.onend = () => { micBtn.classList.remove('active'); };
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('userInput').value = text;
            handleSend();
        };

        recognition.onerror = (err) => {
            console.error("Mikrofon hatası:", err);
            micBtn.classList.remove('active');
            alert("Mikrofon izni verilmedi veya desteklenmiyor.");
        };
    }

    micBtn.onclick = () => {
        try {
            recognition.start();
        } catch (e) {
            recognition.stop();
        }
    };

    // --- CHAT SİSTEMİ ---
    function addMsg(sender, text) {
        const out = document.getElementById('chat-output');
        const div = document.createElement('div');
        div.className = `msg ${sender}-msg`;
        div.innerText = text;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
        return div;
    }

    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg('user', text);
        input.value = '';
        chatHistory.push({ role: "user", content: text });

        const loadingMsg = addMsg('ai', 'Düşünüyorum...');

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href,
                },
                body: JSON.stringify({
                    "model": MODEL,
                    "messages": chatHistory,
                    "temperature": 0.7
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            loadingMsg.innerText = reply;
            chatHistory.push({ role: "assistant", content: reply });

        } catch (error) {
            loadingMsg.innerText = "Hata: Sunucuya bağlanamadım.";
        }
    }

    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
</script>

</body>
</html>
