<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --chat-bg: #161616;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-red);
            background: rgba(0,0,0,0.8);
            z-index: 10;
        }

        .logo-red {
            width: 50px; height: 50px;
            fill: var(--primary-red);
            filter: drop-shadow(0 0 12px var(--primary-red));
        }

        h1 {
            font-size: 1rem;
            margin: 5px 0 0;
            letter-spacing: 4px;
            color: var(--primary-red);
            text-transform: uppercase;
        }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%);
        }

        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background: #2c2c2c; border-bottom-right-radius: 2px; }
        .ai-message {
            align-self: flex-start;
            background: var(--primary-red);
            color: white;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }

        .loading { font-style: italic; opacity: 0.7; font-size: 0.8rem; }

        .controls {
            padding: 20px;
            background: #111;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #222;
        }

        input#userInput {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            outline: none;
        }

        .btn-send { 
            background: var(--primary-red); 
            color: white; 
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <svg class="logo-red" viewBox="0 0 24 24">
        <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
    </svg>
    <h1>MEMO AI</h1>
</header>

<div id="chat-output">
    </div>

<div class="controls">
    <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
    <button onclick="processChat()" class="btn-send">➤</button>
</div>

<script>
    const PORTKEY_API_KEY = 'RHwmqEtsrEMKtdCFwsS763LaeBC6'; 
    const PORTKEY_GATEWAY_URL = "https://api.portkey.ai/v1/chat/completions";

    let chatHistory = [
        { role: "system", content: "Senin adın MEMO AI. Gemini modelini kullanıyorsun." }
    ];

    async function processChat() {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;

        addMessage('user', text);
        inputField.value = '';
        chatHistory.push({ role: "user", content: text });

        const loadingId = addMessage('ai', 'Düşünüyor...', true);

        try {
            const response = await fetch(PORTKEY_GATEWAY_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-portkey-api-key": PORTKEY_API_KEY,
                    "x-portkey-provider": "google"
                },
                body: JSON.stringify({
                    model: "gemini-1.5-flash",
                    messages: chatHistory
                })
            });

            const data = await response.json();
            
            // Yükleniyor mesajını kaldır
            document.getElementById(loadingId).remove();

            if (data.choices && data.choices[0]) {
                const aiReply = data.choices[0].message.content;
                addMessage('ai', aiReply);
                chatHistory.push({ role: "assistant", content: aiReply });
            } else {
                console.error("API Hatası Detayı:", data);
                addMessage('ai', "Hata: " + (data.error?.message || "Bilinmeyen bir API hatası oluştu."));
            }

        } catch (e) {
            document.getElementById(loadingId).remove();
            addMessage('ai', "Bağlantı hatası! Portkey Gateway erişimi reddetti.");
        }
    }

    function addMessage(sender, text, isLoading = false) {
        const output = document.getElementById('chat-output');
        const div = document.createElement('div');
        const id = "msg-" + Date.now();
        div.id = id;
        div.className = `message ${sender}-message ${isLoading ? 'loading' : ''}`;
        div.innerText = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        return id;
    }

    document.getElementById('userInput').addEventListener("keypress", (e) => { 
        if (e.key === "Enter") processChat(); 
    });
</script>

</body>
</html>
