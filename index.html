<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI - Pro Dashboard</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --sidebar-bg: #111111;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
            transition: 0.3s;
            position: fixed;
            height: 100%;
            z-index: 1000;
            left: -280px;
        }

        #sidebar.open { left: 0; }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #1a1a1a;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .history-item:hover { border-color: var(--primary-red); }

        .clear-btn {
            padding: 15px;
            background: #1a0000;
            color: #ff4444;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- MAIN --- */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        header {
            padding: 15px 20px;
            background: #000;
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
        }

        .hamburger {
            font-size: 24px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            margin-right: 15px;
        }

        header h1 {
            flex: 1;
            font-size: 1.1rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--primary-red);
            text-transform: uppercase;
        }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%);
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message { align-self: flex-end; background: #2c2c2c; border-bottom-right-radius: 2px; }
        .ai-message { align-self: flex-start; background: var(--primary-red); border-bottom-left-radius: 2px; box-shadow: 0 4px 15px rgba(255,0,0,0.1); }

        .controls {
            padding: 20px;
            background: #111;
            display: flex;
            gap: 12px;
            border-top: 1px solid #222;
        }

        #userInput {
            flex: 1;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
            outline: none;
        }

        .send-btn {
            background: var(--primary-red);
            border: none;
            width: 48px; height: 48px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div class="sidebar-header">
        <span>Sohbet Geçmişi</span>
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">✕</button>
    </div>
    <div id="historyList" class="history-list"></div>
    <button class="clear-btn" onclick="clearHistory()">Tüm Geçmişi Sil</button>
</div>

<div id="main">
    <header>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1>MEMO AI PRO</h1>
    </header>

    <div id="chat-output"></div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
        <button onclick="processChat()" class="send-btn">➤</button>
    </div>
</div>

<script>
    // AYARLAR
    const PORTKEY_API_KEY = 'RHwmqEtsrEMKtdCFwsS763LaeBC6';
    const MODEL = "gemini-pro-latest"; // İstediğin spesifik model

    // Depolamadan verileri çek (Yoksa boş dizi başlat)
    let chatHistory = JSON.parse(localStorage.getItem('memo_pro_chats')) || [];

    window.onload = () => {
        renderChat();
        updateSidebar();
    };

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function processChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        // Kullanıcı mesajını ekle ve render et
        chatHistory.push({ role: "user", content: text });
        renderChat();
        input.value = '';

        try {
            const response = await fetch("https://api.portkey.ai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-portkey-api-key": PORTKEY_API_KEY,
                    "x-portkey-provider": "google"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: "Senin adın MEMO AI. Google Gemini Pro Latest modelisin. Kurucun Mehmet Can YILDIRIM'dır." },
                        ...chatHistory
                    ]
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            chatHistory.push({ role: "assistant", content: aiReply });
            saveData();

        } catch (e) {
            console.error(e);
            alert("Bağlantı hatası! Portkey veya Model yanıt vermedi.");
        }
    }

    function renderChat() {
        const output = document.getElementById('chat-output');
        output.innerHTML = chatHistory.map(msg => `
            <div class="message ${msg.role === 'user' ? 'user-message' : 'ai-message'}">
                ${msg.content}
            </div>
        `).join('');
        output.scrollTop = output.scrollHeight;
    }

    function updateSidebar() {
        const list = document.getElementById('historyList');
        const userMsgs = chatHistory.filter(m => m.role === 'user');
        list.innerHTML = userMsgs.reverse().map(m => `
            <div class="history-item">${m.content.substring(0, 30)}...</div>
        `).join('');
    }

    function saveData() {
        localStorage.setItem('memo_pro_chats', JSON.stringify(chatHistory));
        renderChat();
        updateSidebar();
    }

    function clearHistory() {
        if(confirm("Tüm mesaj geçmişi silinecek. Emin misin?")) {
            localStorage.removeItem('memo_pro_chats');
            chatHistory = [];
            renderChat();
            updateSidebar();
        }
    }

    document.getElementById('userInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") processChat();
    });
</script>

</body>
</html>
