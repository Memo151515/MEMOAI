<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI - Dashboard</title>
    <style>
        :root {
            --red: #ff0000;
            --black: #000000;
            --dark-gray: #121212;
            --light-gray: #1e1e1e;
            --text: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--black); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- HAMBURGER MENÜ (SIDEBAR) --- */
        #sidebar {
            width: 300px;
            background: var(--dark-gray);
            position: fixed;
            left: -300px;
            top: 0;
            height: 100%;
            transition: 0.4s;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--red);
        }

        #sidebar.active { left: 0; }

        .sidebar-content { padding: 20px; flex: 1; overflow-y: auto; }
        .sidebar-header { 
            padding: 20px; 
            background: var(--black); 
            color: var(--red); 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .section-title { color: var(--red); font-size: 0.9rem; margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        /* Geçmiş ve Bellek Kutuları */
        .history-item { background: var(--light-gray); padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 0.8rem; cursor: pointer; border-left: 3px solid var(--red); }
        .memory-box { background: #000; padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 0.8rem; color: #0f0; }

        /* --- ANA PANEL --- */
        #main { flex: 1; display: flex; flex-direction: column; width: 100%; transition: 0.4s; }
        header { background: var(--black); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid var(--red); }
        .hamburger-btn { background: none; border: none; color: white; font-size: 25px; cursor: pointer; margin-right: 15px; }
        header h1 { flex: 1; margin: 0; font-size: 1.2rem; color: var(--red); text-align: center; }

        #chat-output { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.4; }
        .user { align-self: flex-end; background: #333; }
        .ai { align-self: flex-start; background: var(--red); box-shadow: 0 0 10px rgba(255,0,0,0.3); }

        .input-area { padding: 20px; background: var(--dark-gray); display: flex; gap: 10px; }
        #userInput { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #000; color: white; outline: none; }
        .btn { background: var(--red); border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* Arkaplanı karartma */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        #overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar">
    <div class="sidebar-header">
        <span>MEMO AI KONTROL</span>
        <span style="cursor:pointer" onclick="toggleSidebar()">✕</span>
    </div>
    <div class="sidebar-content">
        <div class="section-title">BELLEK DURUMU</div>
        <div class="memory-box" id="memoryInfo">
            > CPU: %12<br>
            > RAM: 1.3GB (Llama 3.2)<br>
            > KURUCU: M.C.YILDIRIM<br>
            > DURUM: Gelişiyor...
        </div>

        <div class="section-title">SOHBET GEÇMİŞİ</div>
        <div id="historyContainer"></div>
        <button onclick="clearHistory()" style="background:none; border:none; color:#666; font-size:10px; cursor:pointer; margin-top:10px;">Geçmişi Temizle</button>
    </div>
</div>

<div id="main">
    <header>
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        <h1>MEMO AI</h1>
    </header>

    <div id="chat-output"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
        <button class="btn" onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    const output = document.getElementById('chat-output');
    const input = document.getElementById('userInput');
    const historyContainer = document.getElementById('historyContainer');

    // Menüyü Aç/Kapat
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        loadHistory(); // Menü açıldığında geçmişi güncelle
    }

    // Mesaj Gönder
    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        saveToHistory(text);
        input.value = '';

        try {
            const response = await fetch("http://localhost:11434/api/generate", {
                method: "POST",
                body: JSON.stringify({
                    model: "llama3.2:1b",
                    prompt: `Sen Mehmet Can YILDIRIM tarafından yaratılan MEMO AI'sın. Soru: ${text}`,
                    stream: false
                })
            });
            const data = await response.json();
            addMessage(data.response, 'ai');
        } catch (e) {
            addMessage("Ollama bağlı değil Mehmet Can. Lütfen kontrol et.", 'ai');
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    // --- GEÇMİŞ YÖNETİMİ ---
    function saveToHistory(text) {
        let history = JSON.parse(localStorage.getItem('memo_history') || '[]');
        history.unshift(text); // Yeni mesajı başa ekle
        if(history.length > 10) history.pop(); // Sadece son 10 mesaj
        localStorage.setItem('memo_history', JSON.stringify(history));
    }

    function loadHistory() {
        historyContainer.innerHTML = '';
        let history = JSON.parse(localStorage.getItem('memo_history') || '[]');
        history.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = item.substring(0, 30) + "...";
            historyContainer.appendChild(div);
        });
    }

    function clearHistory() {
        localStorage.removeItem('memo_history');
        loadHistory();
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    
    // Sayfa açıldığında geçmişi yükle
    loadHistory();
</script>

</body>
</html>
