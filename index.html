<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEMO AI v4</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --sidebar-bg: #121212;
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            height: 100dvh; 
            overflow: hidden;
            display: flex;
        }

        /* Sidebar Geliştirmesi */
        #sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: fixed;
            height: 100%;
            z-index: 1000;
            transform: translateX(-100%);
        }

        #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #222; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; background: #1a1a1a; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Ana İçerik */
        #main-content { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }

        header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
            background: #0a0a0a;
        }

        #menu-toggle { position: absolute; left: 15px; font-size: 24px; background: none; border: none; color: white; cursor: pointer; }
        h1 { font-size: 0.9rem; letter-spacing: 4px; color: var(--primary-red); margin: 0; }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(to bottom, #0f0f0f, #050505);
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message { align-self: flex-end; background: #252525; border: 1px solid #333; }
        .ai-message { align-self: flex-start; background: var(--primary-red); color: white; }

        /* Giriş Alanı */
        .controls {
            padding: 15px;
            background: #0a0a0a;
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        input#userInput {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            outline: none;
            font-size: 16px;
        }

        .btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-mic { background: #1a1a1a; color: #666; border: 1px solid #333; }
        .btn-mic.recording { background: var(--primary-red); color: white; animation: pulse 1s infinite; }
        .btn-send { background: var(--primary-red); color: white; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Media */
        .media-container { margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .ai-media { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">BELLEK <span onclick="toggleMenu()" style="cursor:pointer">✕</span></div>
    <div id="history-list"></div>
    <div style="padding:15px"><button onclick="newChat()" style="width:100%; padding:12px; background:var(--primary-red); color:white; border:none; border-radius:8px; font-weight:bold;">+ Yeni Sohbet</button></div>
</div>

<div id="main-content">
    <header>
        <button id="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>MEMO AI</h1>
    </header>

    <div id="chat-output"></div>

    <div class="controls">
        <button id="micBtn" class="btn btn-mic">🎤</button>
        <input type="text" id="userInput" placeholder="MEMO'ya sor..." autocomplete="off">
        <button onclick="processChat()" class="btn btn-send">➤</button>
    </div>
</div>

<script>
    // --- API YAPILANDIRMASI ---
    const API_KEY = "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";
    // Ücretsiz ve daha stabil bir model seçtik
    const MODEL = "google/gemini-flash-1.5-8b"; 
    const SYSTEM_PROMPT = "Senin adın MEMO AI. Kurucun Mehmet Can YILDIRIM. Kısa, zeki ve samimi cevaplar ver.";

    let chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
    let allSessions = JSON.parse(localStorage.getItem('memo_ai_sessions')) || {};
    let currentId = Date.now();

    // --- MİKROFON SİSTEMİ (FIXED) ---
    const micBtn = document.getElementById('micBtn');
    const input = document.getElementById('userInput');
    let recognition;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'tr-TR';
        recognition.continuous = false;

        recognition.onstart = () => micBtn.classList.add('recording');
        recognition.onend = () => micBtn.classList.remove('recording');
        recognition.onresult = (e) => {
            input.value = e.results[0][0].transcript;
            processChat();
        };
    }

    micBtn.onclick = () => {
        try { recognition.start(); } catch(e) { recognition.stop(); }
    };

    // --- CHAT SİSTEMİ ---
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    async function processChat() {
        const text = input.value.trim();
        if(!text) return;

        addMsg('user', text);
        input.value = '';
        chatHistory.push({ role: "user", content: text });

        const loading = addMsg('ai', '...');

        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.origin // OpenRouter güvenliği için
                },
                body: JSON.stringify({
                    "model": MODEL,
                    "messages": chatHistory,
                    "temperature": 0.7
                })
            });

            const data = await res.json();
            
            if(data.choices) {
                const reply = data.choices[0].message.content;
                loading.innerText = reply;
                chatHistory.push({ role: "assistant", content: reply });
                saveSession();
            } else {
                loading.innerText = "Şu an yanıt veremiyorum, lütfen tekrar dene.";
            }

        } catch (e) {
            loading.innerText = "Bağlantı hatası: İnternetini veya API anahtarını kontrol et.";
        }
    }

    function addMsg(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        div.innerText = text;
        const out = document.getElementById('chat-output');
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
        return div;
    }

    function saveSession() {
        if (chatHistory.length > 1) {
            const title = chatHistory[1].content.substring(0, 20) + "...";
            allSessions[currentId] = { title, messages: chatHistory };
            localStorage.setItem('memo_ai_sessions', JSON.stringify(allSessions));
            renderSidebar();
        }
    }

    function renderSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        Object.keys(allSessions).reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = allSessions[id].title;
            div.onclick = () => {
                chatHistory = allSessions[id].messages;
                currentId = id;
                document.getElementById('chat-output').innerHTML = '';
                chatHistory.forEach(m => { if(m.role !== 'system') addMsg(m.role === 'user' ? 'user' : 'ai', m.content); });
                toggleMenu();
            };
            list.appendChild(div);
        });
    }

    function newChat() {
        chatHistory = [{ role: "system", content: SYSTEM_PROMPT }];
        currentId = Date.now();
        document.getElementById('chat-output').innerHTML = '';
        if(window.innerWidth < 768) toggleMenu();
    }

    input.onkeypress = (e) => { if(e.key === 'Enter') processChat(); };
    window.onload = renderSidebar;
</script>

</body>
</html>
