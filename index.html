<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO AI</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0d1117;
            --sidebar-bg: #161b22;
            --text-color: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30363d;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            height: 100%;
            z-index: 1000;
            left: -280px;
        }

        #sidebar.open { left: 0; }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #21262d;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { border-color: var(--primary-red); }

        .clear-btn {
            padding: 15px;
            background: #1a0000;
            color: #f85149;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- MAIN --- */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        header {
            padding: 15px 20px;
            background: #010409;
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
        }

        .hamburger {
            font-size: 24px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            margin-right: 15px;
        }

        header h1 {
            flex: 1;
            font-size: 1rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--primary-red);
            text-transform: uppercase;
            text-align: center;
        }

        #chat-output {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .user-message { align-self: flex-end; background: #238636; color: white; }
        .ai-message { align-self: flex-start; background: #30363d; border-left: 4px solid var(--primary-red); }

        .controls {
            padding: 20px;
            background: #0d1117;
            display: flex;
            gap: 12px;
            border-top: 1px solid #30363d;
        }

        #userInput {
            flex: 1;
            padding: 12px 18px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #010409;
            color: white;
            outline: none;
        }

        .send-btn {
            background: var(--primary-red);
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div class="sidebar-header">
        <span>Sohbet Geçmişi</span>
        <button onclick="toggleMenu()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div id="historyList" class="history-list"></div>
    <button class="clear-btn" onclick="clearHistory()">Geçmişi Temizle</button>
</div>

<div id="main">
    <header>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <h1>MEMO AI GITHUB EDITION</h1>
    </header>

    <div id="chat-output"></div>

    <div class="controls">
        <input type="text" id="userInput" placeholder="Mesajınızı buraya yazın...">
        <button onclick="processChat()" class="send-btn">GÖNDER</button>
    </div>
</div>

<script>
    // BURAYA YENİ ALDIĞIN GÜVENLİ ANAHTARI YAPIŞTIRMALISIN
    const GITHUB_TOKEN = "YENI_ANAHTARINI_BURAYA_KOY"; 
    const MODEL_ENDPOINT = "https://models.inference.ai.azure.com/chat/completions";

    let chatHistory = JSON.parse(localStorage.getItem('memo_github_chats')) || [];

    window.onload = () => {
        renderChat();
        updateSidebar();
    };

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function processChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        chatHistory.push({ role: "user", content: text });
        renderChat();
        input.value = '';

        try {
            const response = await fetch(MODEL_ENDPOINT, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                    // GPT-5 henüz yok, mevcut en güçlü GitHub modellerinden biri:
                    model: "gpt-4o", 
                    messages: [
                        { role: "system", content: "Sen MEMO AI'sın. GitHub Models altyapısını kullanıyorsun." },
                        ...chatHistory
                    ]
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            chatHistory.push({ role: "assistant", content: aiReply });
            saveData();

        } catch (e) {
            alert("Hata: API anahtarın geçersiz olabilir veya yetkin yok.");
        }
    }

    function renderChat() {
        const output = document.getElementById('chat-output');
        output.innerHTML = chatHistory.map(msg => `
            <div class="message ${msg.role === 'user' ? 'user-message' : 'ai-message'}">
                ${msg.content}
            </div>
        `).join('');
        output.scrollTop = output.scrollHeight;
    }

    function updateSidebar() {
        const list = document.getElementById('historyList');
        const userMsgs = chatHistory.filter(m => m.role === 'user').reverse();
        list.innerHTML = userMsgs.map(m => `
            <div class="history-item">${m.content}</div>
        `).join('');
    }

    function saveData() {
        localStorage.setItem('memo_github_chats', JSON.stringify(chatHistory));
        renderChat();
        updateSidebar();
    }

    function clearHistory() {
        localStorage.removeItem('memo_github_chats');
        chatHistory = [];
        saveData();
    }

    document.getElementById('userInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") processChat();
    });
</script>

</body>
</html>
